body{

/* NAVBAR */

position:sticky;
top:0;
z-index:999;
background:#050505ee;
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(250,204,21,.1);
}

.nav-inner{
height:80px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
font-size:28px;
font-weight:800;

}

.menu{
display:flex;
gap:40px;
}

.menu a{
text-decoration:none;
color:#fff;
font-size:14px;
font-weight:600;
}

.menu a.active{
color:var(--gold);
}

/* HERO */

.hero{
padding:50px 0;
}

.hero-banner{
position:relative;
height:780px;
border-radius:40px;
overflow:hidden;
border:1px solid rgba(250,204,21,.35);
box-shadow:
0 0 40px rgba(250,204,21,.25),
0 0 100px rgba(250,204,21,.15);
transition:.5s;
}

.hero-banner img{
width:100%;
height:100%;
object-fit:cover;
transition:1s;
}

.hero-banner:hover img{
transform:scale(1.05);
}

.hero-overlay{
position:absolute;
inset:0;
background:
linear-gradient(
90deg,
rgba(0,0,0,.95) 0%,
rgba(0,0,0,.65) 40%,
rgba(0,0,0,.1) 100%
);
}

.hero-content{
position:absolute;
left:60px;
top:50%;
transform:translateY(-50%);
max-width:500px;
}

.hero-kicker{
color:var(--gold);
font-size:18px;
font-weight:700;
margin-bottom:20px;
}

.hero-title{
font-size:110px;
line-height:.9;
font-weight:900;
}

.hero-title span{
color:var(--gold);
}

.hero-text{
margin-top:25px;
font-size:22px;
line-height:1.6;
color:#ccc;
}

.hero-buttons{
margin-top:35px;
display:flex;
gap:20px;
}

.btn-primary{
background:var(--gold);
color:#000;
padding:16px 34px;
border-radius:12px;
font-weight:700;
text-decoration:none;
}

.btn-secondary{
border:1px solid var(--gold);
padding:16px 34px;
border-radius:12px;
text-decoration:none;
color:#fff;
}

/* SPORTS SECTION */

.sports-section{
padding:70px 0;
}

.section-title{
display:none;
}

.arena-title{
text-align:center;
padding:80px 20px 60px;

background:
linear-gradient(
180deg,
rgba(250,204,21,.05),
rgba(0,0,0,0)
);

}

.arena-title h1{

font-weight:900;
line-height:.9;
color:#fff;
text-transform:uppercase;
}

.arena-title h1 span{

text-shadow:0 0 25px rgba(250,204,21,.8);
}

.arena-title p{

font-size:18px;

color:#888;
}
.sports-subtitle{

font-size:18px;
color:#9ca3af;
max-width:850px;
line-height:1.8;
}
/* Filter Removed */
.sports-section{
position:relative;
overflow:hidden;
}

.sports-section::before{
content:"";
position:absolute;
top:-200px;
left:50%;
transform:translateX(-50%);

width:900px;
height:900px;

background:
radial-gradient(
circle,
rgba(250,204,21,.08),
transparent 70%

pointer-events:none;
}
.cards{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:25px;

background:
linear-gradient(
180deg,
rgba(250,204,21,.03),
rgba(0,0,0,0)
);

padding-top:20px;

}

.card{
background:rgba(10,10,10,.85);
backdrop-filter:blur(10px);
border-radius:20px;
overflow:hidden;
border:1px solid rgba(250,204,21,.12);
transition:.4s;
cursor:pointer;
}

.card:hover{
transform:
translateY(-12px)
scale(1.04)

border-color:var(--gold);

0 0 30px rgba(250,204,21,.25),
0 0 80px rgba(250,204,21,.10);

height:230px;

.card-content{

.card-content h3{
font-size:22px;
margin-bottom:10px;
}

.custom-play.hide{

0 0 25px #facc15,

radial-gradient(

@keyframes dustMove{
from{
transform:translateY(0);

<script>

function openVideo(videoSrc){

document.getElementById("popup")
.classList.add("active");

const video=document.getElementById("popupVideo");

video.addEventListener("click", function(e){

e.preventDefault();

if(video.paused){

video.play();

}else{

video.pause();

}

});
video.controls = true;

const btn=document.getElementById("customPlay");

video.src=videoSrc;

video.onloadeddata = () => {

video.play();

setTimeout(()=>{

btn.classList.add("hide");
btn.classList.remove("show");

},300);

};

}

function closeVideo(){

document.getElementById("popup")
.classList.remove("active");

const video=document.getElementById("popupVideo");
const btn=document.getElementById("customPlay");

video.pause();
video.src="";

btn.classList.add("hide");
btn.classList.remove("show");

}

function togglePlay(){

const video=document.getElementById("popupVideo");
const btn=document.getElementById("customPlay");

if(video.paused){

video.play();

btn.classList.add("hide");
btn.classList.remove("show");

}else{

video.pause();

btn.classList.remove("hide");
btn.classList.add("show");

}

}

document.addEventListener("DOMContentLoaded",()=>{

const video=document.getElementById("popupVideo");
const btn=document.getElementById("customPlay");

video.addEventListener("pause",()=>{

btn.classList.remove("hide");
btn.classList.add("show");

});

video.addEventListener("play",()=>{

if(document.activeElement !== video){

btn.classList.add("hide");
btn.classList.remove("show");

}

});



video.addEventListener("ended",()=>{

btn.classList.remove("hide");
btn.classList.add("show");

});

});

</script>
